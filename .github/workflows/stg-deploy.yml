name: deployment to staging

on:
  schedule:
    - cron:  '30 5 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: clone a theme repo
      run: |
         git clone https://github.com/kogeletey/karzok.git src
         mkdir -p src/static
         mv CNAME src/static/CNAME
    - name: compile addition resources
      run: |
        cd src
        npm ci
        npm run compile:js
        npm run link:assets
    - name: zola build
      uses: shalzz/zola-deploy-action@master
      env:
       BUILD_DIR: src
       BUILD_FLAGS: --base-url https://karzok.stg.re128.org
       PAGES_BRANCH: gh-pages
       GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


