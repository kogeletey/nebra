image: ghcr.io/kogeletey/karzok

variables:
  GITHUB_REPO: kogeletey/karzok

mirror:
    script:
        - apk add git
        - git config --global push.default simple
        - git checkout ${CI_COMMIT_REF_NAME}
        - git merge
        - mkdir ~/.ssh
        - printf "%s\n" "${SSH_KEY}" > ~/.ssh/id_rsa
        - chmod 600 ~/.ssh/id_rsa
        - ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
        - echo "Pushing to git@github.com:${GITHUB_REPO}.git"
        - git push git@github.com:${GITHUB_REPO}.git
        - git push git@github.com:${GITHUB_REPO}.git --tags

pages:
  script:
    - sh /www/build.sh
    - mv /www/public public
  only:
   - develop
  artifacts:
    paths:
      - public/
